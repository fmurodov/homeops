---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: esphome
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Smart Home
    gethomepage.dev/icon: sh-esphome.svg
    gethomepage.dev/name: ESPHome
    gethomepage.dev/app: esphome
spec:
  parentRefs:
    - name: main-gateway
      namespace: network
  hostnames:
    - "esphome.${CLUSTER_DOMAIN}"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: esphome-http
          port: 6052
