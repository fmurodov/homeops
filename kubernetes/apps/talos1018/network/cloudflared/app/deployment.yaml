---
# yaml-language-server: $schema=https://json.schemastore.org/kubernetes
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  labels:
    app.kubernetes.io/name: cloudflared
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: cloudflared
  replicas: 1 # You could also consider elastic scaling for this deployment
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cloudflared
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "2000"
    spec:
      securityContext:
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:2026.7.1
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
          args:
            - tunnel
            - --no-autoupdate
            - --config
            - /etc/cloudflared/config.yaml
            - run
          env:
            - name: TUNNEL_EDGE_IP_VERSION
              value: "6"
            - name: TUNNEL_LOGLEVEL
              value: "info"
            - name: TUNNEL_METRICS
              value: "0.0.0.0:2000"
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflared-secret
                  key: TUNNEL_TOKEN
          volumeMounts:
            - name: config
              mountPath: /etc/cloudflared
              readOnly: true
          ports:
            - name: metrics
              containerPort: 2000
              protocol: TCP
          resources:
            limits:
              cpu: "0.05"
              memory: "100Mi"
            requests:
              cpu: "0.005"
              memory: "40Mi"
          livenessProbe:
            httpGet:
              # Cloudflared has a /ready endpoint which returns 200 if and only if
              # it has an active connection to the edge.
              path: /ready
              port: 2000
            failureThreshold: 1
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            # Gates rolling updates on config changes: the old pod keeps
            # serving until the new one is connected to the edge.
            httpGet:
              path: /ready
              port: 2000
            periodSeconds: 5
            failureThreshold: 3
      volumes:
        - name: config
          configMap:
            name: cloudflared-config
