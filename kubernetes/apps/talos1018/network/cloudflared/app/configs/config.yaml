---
# NOTE: This file is not mounted anywhere — the tunnel is remotely managed
# (TUNNEL_TOKEN); it only documents the public-hostname rules configured in
# the Cloudflare Zero Trust dashboard.
ingress:
  - hostname: "*.${DOMAIN}"
    originRequest:
      http2Origin: true
      httpHostHeader: ""
      noTLSVerify: true
      originServerName: ""
    service: https://cilium-gateway-main-gateway.network.svc.cluster.local
  - hostname: "*.${DOMAIN_LEGACY}"
    originRequest:
      http2Origin: true
      httpHostHeader: ""
      noTLSVerify: true
      originServerName: ""
    service: https://cilium-gateway-main-gateway.network.svc.cluster.local
  - service: http_status:404
