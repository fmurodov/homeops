---
# Applies to all ingress rules; override per-rule if ever needed.
originRequest:
  http2Origin: true
  matchSNItoHost: true
  noTLSVerify: true
ingress:
  - hostname: "*.${DOMAIN}"
    service: https://cilium-gateway-main-gateway.network.svc.cluster.local
  - hostname: "*.${DOMAIN_LEGACY}"
    service: https://cilium-gateway-main-gateway.network.svc.cluster.local
  - service: http_status:404
