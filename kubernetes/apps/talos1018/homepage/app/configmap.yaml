---
# yaml-language-server: $schema=https://json.schemastore.org/kubernetes
apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
  labels:
    app.kubernetes.io/name: homepage
data:
  bookmarks.yaml: |
    - IaC:
      - HomeOps:
        - icon: sh-github.svg
          description: HomeOps repo
          href: https://github.com/fmurodov/homeops
      - fmurodov-tf:
        - icon: sh-gitlab.svg
          description: OpenTofu pipeline
          href: https://gitlab.com/fmurodov/fmurodov-tf
  docker.yaml: ""
  kubernetes.yaml: |
    mode: cluster
    gateway: true
  services.yaml: |
    - Apps:
      - Printer:
          description: HP Printer and Scanner
          href: http://printer-hp-1.home./
          icon: hp
          ping: printer-hp-1.home.
      - Minecraft:
          description: Obshi Server
          icon: minecraft
          app: bds
          namespace: minecraft
          widget:
            type: gamedig
            serverType: mbe
            url: udp://bds.minecraft-bedrock.svc.cluster.local:19132
            fields: ["name", "players", "status"]
    - Infra:
      - pikvm:
          description: rock64 PiKVM
          href: https://pikvm.home.
          icon: sh-pikvm.svg
          ping: pikvm.home.
    - Network:
      - Unifi Controller:
          description: Unifi Console
          href: https://unifi.ui.com
          icon: https://upload.wikimedia.org/wikipedia/commons/4/4d/Ubiquiti_Logo_2023.svg
          siteMonitor: http://1018LC-GW-U-1.home.:8080/status
    - Smart Home:
      - Energy meter:
          description: p1-dongle-pro
          href: http://p1-dongle-pro.home./
          ping: p1-dongle-pro.home.
    - ADSB:
      - Adsb feeder:
          description: ADSB feeder statuspage
          href: http://adsb-feeder.home.
          ping: adsb-feeder.home.
          icon: http://adsb-feeder.home:8080/images/tar1090-favicon.png
          siteMonitor: http://adsb-feeder.home./api/base_info
      - Adsb feeder map:
          description: ADSB feeder map
          href: http://adsb-feeder.home.:8080
          icon: http://adsb-feeder.home.:8080/images/tar1090-favicon.png

  settings.yaml: |
    layout:
      Apps:
        style: row
        columns: 4
      Smart Home:
        style: row
        columns: 3
      Infra:
        style: row
        columns: 3
      Observability:
        style: row
        columns: 4
      Network:
        style: row
        columns: 2
      ADSB:
        style: row
        columns: 3
    providers:
      longhorn:
        url: http://longhorn-frontend.longhorn-system.svc.cluster.local
  widgets.yaml: |
    - kubernetes:
        cluster:
          cpu: true
          label: cluster
          memory: true
          show: true
          showLabel: true
        nodes:
          cpu: true
          memory: true
          show: true
          showLabel: true
    - search:
        provider: duckduckgo
        target: _blank
    - longhorn:
        # Show the expanded view
        expanded: true
        # Shows a node representing the aggregate values
        total: true
        # Shows the node names as labels
        labels: true
        # Show the nodes
        nodes: true
