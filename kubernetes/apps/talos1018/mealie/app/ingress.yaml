---
# yaml-language-server: $schema=https://json.schemastore.org/kubernetes
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mealie
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: "letsencrypt"
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Apps
    gethomepage.dev/icon: sh-mealie.svg
    gethomepage.dev/name: Mealie
    gethomepage.dev/app: mealie
    gethomepage.dev/description: Recipe manager
    gethomepage.dev/widget.type: mealie
    gethomepage.dev/widget.url: http://mealie-http.mealie.svc.cluster.local:9000
    gethomepage.dev/widget.key: "{{HOMEPAGE_VAR_MEALIE_APIKEY}}"
    gethomepage.dev/widget.version: "2"

spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - "mealie.${CLUSTER_DOMAIN}"
        - "recipe.${DOMAIN}"
      secretName: mealie-tls
  rules:
    - host: "mealie.${CLUSTER_DOMAIN}"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mealie-http
                port:
                  number: 9000
    - host: "recipe.${DOMAIN}"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mealie-http
                port:
                  number: 9000
