---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app wishlist
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  values:
    controllers:
      wishlist:
        containers:
          app:
            image:
              repository: ghcr.io/cmintey/wishlist
              tag: v0.60.1
            env:
              ORIGIN: "https://wishlist.${DOMAIN}"
              TOKEN_TIME: "72"
              DEFAULT_CURRENCY: "EUR"
            resources:
              requests:
                cpu: 5m
                memory: 64Mi
              limits:
                memory: 256Mi
        pod:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: "OnRootMismatch"
    service:
      app:
        controller: wishlist
        ipFamilyPolicy: SingleStack
        ipFamilies:
          - IPv6
        ports:
          http:
            port: &port 3280
    ingress:
      app:
        className: nginx
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt
        enabled: true
        hosts:
          - host: &hostName wishlist.${DOMAIN}
            paths:
              - path: /
                service:
                  identifier: app
                  port: *port
        tls:
          - hosts:
              - *hostName
            secretName: wishlist-tls
    persistence:
      data:
        existingClaim: wishlist-data
        advancedMounts:
          wishlist:
            app:
              - path: /usr/src/app/data
                subPath: data
              - path: /usr/src/app/uploads
                subPath: uploads
