---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app openwebui
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  values:
    controllers:
      openwebui:
        annotations:
          reloader.stakater.com/auto: "true"
        strategy: Recreate
        containers:
          app:
            image:
              repository: ghcr.io/open-webui/open-webui
              # renovate: datasource=docker depName=ghcr.io/open-webui/open-webui
              tag: 0.9.6
            env:
              PORT: "8080"
              # Backend
              OLLAMA_BASE_URL: http://ollama.ai.svc.cluster.local:11434
              WEBUI_URL: https://openwebui.${CLUSTER_DOMAIN}
              # Disable local signups — auth via Pocket ID only
              WEBUI_AUTH: "true"
              ENABLE_SIGNUP: "false"
              ENABLE_LOGIN_FORM: "false"
              # OIDC / Pocket ID
              ENABLE_OAUTH_SIGNUP: "true"
              OAUTH_MERGE_ACCOUNTS_BY_EMAIL: "true"
              OAUTH_PROVIDER_NAME: Pocket ID
              OAUTH_SCOPES: openid email profile
              OAUTH_USERNAME_CLAIM: preferred_username
              OAUTH_EMAIL_CLAIM: email
              OPENID_PROVIDER_URL: https://pid.${DOMAIN}/.well-known/openid-configuration
              OPENID_REDIRECT_URI: https://openwebui.${CLUSTER_DOMAIN}/oauth/oidc/callback
              WEBUI_SECRET_KEY:
                valueFrom:
                  secretKeyRef:
                    name: openwebui-secret
                    key: WEBUI_SECRET_KEY
              OAUTH_CLIENT_ID:
                valueFrom:
                  secretKeyRef:
                    name: openwebui-secret
                    key: OAUTH_CLIENT_ID
              OAUTH_CLIENT_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: openwebui-secret
                    key: OAUTH_CLIENT_SECRET
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  # First run downloads ~1 GB of sentence-transformers weights from HF
                  # into the PVC; restarts still need ~2 min to load embeddings. 20 min cap.
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  failureThreshold: 120
            resources:
              requests:
                cpu: 50m
                memory: 512Mi
              limits:
                memory: 2Gi
        pod:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        forceRename: *app
        primary: true
        controller: openwebui
        ports:
          http:
            port: 8080

    route:
      app:
        enabled: true
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: AI
          gethomepage.dev/icon: open-webui.png
          gethomepage.dev/name: Open WebUI
          gethomepage.dev/app: openwebui
          gethomepage.dev/description: Chat UI for local LLMs
        parentRefs:
          - name: main-gateway
            namespace: network
        hostnames:
          - openwebui.${CLUSTER_DOMAIN}
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - identifier: app
                port: 8080

    persistence:
      data:
        existingClaim: openwebui-data
        advancedMounts:
          openwebui:
            app:
              - path: /app/backend/data
