---
# yaml-language-server: $schema=https://json.schemastore.org/kubernetes
apiVersion: batch/v1
kind: Job
metadata:
  name: ollama-pull-models
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: pull
          # renovate: datasource=docker depName=ollama/ollama
          image: ollama/ollama:0.32.1
          env:
            - name: OLLAMA_HOST
              value: http://ollama.ai.svc.cluster.local:11434
            - name: MODELS
              value: "llama3.1:8b"
          command:
            - /bin/sh
            - -eu
            - -c
            - |
              until ollama list >/dev/null 2>&1; do
                echo "Waiting for ollama service to be ready..."
                sleep 5
              done
              for model in $MODELS; do
                echo "Pulling $model..."
                ollama pull "$model"
                echo "Verifying $model is present..."
                ollama list | awk '{print $1}' | grep -Fxq "$model"
                echo "Preloading $model into memory..."
                ollama run "$model" "" >/dev/null 2>&1 || true
              done
              echo "Done."
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
