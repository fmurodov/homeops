---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app ollama
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  values:
    controllers:
      ollama:
        strategy: Recreate
        containers:
          app:
            image:
              repository: ollama/ollama
              # renovate: datasource=docker depName=ollama/ollama
              tag: 0.30.10
            env:
              OLLAMA_HOST: "[::]:11434"
              OLLAMA_MODELS: /data/models
              HOME: /data
              OLLAMA_KEEP_ALIVE: "-1"
              OLLAMA_MAX_LOADED_MODELS: "1"
              OLLAMA_NUM_PARALLEL: "2"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 11434
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 11434
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 11434
                  initialDelaySeconds: 5
                  periodSeconds: 5
                  failureThreshold: 60
            resources:
              requests:
                cpu: "1"
                memory: 6Gi
              limits:
                cpu: "3"
                memory: 8Gi
        pod:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
          # Pin to nodes with more CPU headroom; talos-1018-1 is excluded.
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: kubernetes.io/hostname
                        operator: In
                        values:
                          - talos-1018-2
                          - talos-1018-3

    service:
      app:
        forceRename: *app
        primary: true
        controller: ollama
        ipFamilyPolicy: SingleStack
        ipFamilies: [IPv6]
        ports:
          http:
            port: 11434

    persistence:
      models:
        existingClaim: ollama-models
        advancedMounts:
          ollama:
            app:
              - path: /data
