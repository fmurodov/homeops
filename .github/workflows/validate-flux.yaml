---
name: validate-flux

on:
  workflow_dispatch:
  push:
    branches: ["*"]
    tags-ignore: ["*"]
    paths:
      - "kubernetes/**"
      - "scripts/validate-flux.sh"
      - ".yamllint.yaml"
      - ".github/workflows/validate-flux.yaml"

jobs:
  manifests:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Setup yq
        uses: fluxcd/pkg/actions/yq@ae1046960bf700baebc328562a7be8ccee8c7078 # main
      - name: Setup kubeconform
        uses: fluxcd/pkg/actions/kubeconform@ae1046960bf700baebc328562a7be8ccee8c7078 # main
      - name: Setup kustomize
        uses: fluxcd/pkg/actions/kustomize@ae1046960bf700baebc328562a7be8ccee8c7078 # main
      - name: Setup yamllint
        run: pip install yamllint
      - name: Validate manifests
        run: ./scripts/validate.sh flux
